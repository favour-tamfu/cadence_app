name: cadence
description: Read with purpose — your intelligent reading companion.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Navigation
  go_router: ^13.2.0

  # ── Supabase
  supabase_flutter: ^2.8.4

  # ── PDF
  flutter_pdfview: ^1.3.2
  file_picker: ^8.0.3

  # ── AI Tutor (Gemini)
  google_generative_ai: ^0.4.3

  # ── Storage / local
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0
  flutter_dotenv: ^5.1.0

  # ── UI helpers
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  lottie: ^3.1.0
  intl: ^0.19.0

  uuid: ^4.3.3
  epub_view: ^3.1.0
  http: ^1.2.1
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
    - assets/lottie/
    - .env

  fonts:
    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Regular.ttf
        - asset: assets/fonts/PlayfairDisplay-Italic.ttf
          style: italic
        - asset: assets/fonts/PlayfairDisplay-Medium.ttf
          weight: 500